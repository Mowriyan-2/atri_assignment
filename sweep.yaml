# wandb sweep config for question 

method: bayes
project: atri-fashion-mnist
program: train.py
metric:
  name: val_accuracy
  goal: maximize

parameters:
  epochs:
    values: [5, 10]
  hidden_layers:
    values: [3, 4, 5]
  hidden_size:
    values: [32, 64, 128]
  weight_decay:
    values: [0, 0.0005, 0.5]
  learning_rate:
    values: [0.001, 0.0001]
  optimizer:
    values: [sgd, momentum, nesterov, rmsprop, adam, nadam]
  batch_size:
    values: [16, 32, 64]
  weight_init:
    values: [random, xavier]
  activation:
    values: [sigmoid, tanh, relu]

# early_terminate kills runs that are clearly doing badly partway through
# instead of letting them run the full number of epochs, saves a lot of time
early_terminate:
  type: hyperband
  min_iter: 3
